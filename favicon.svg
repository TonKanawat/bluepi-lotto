<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="redBall" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="14%" stop-color="#ffc0c0" />
      <stop offset="55%" stop-color="#dc2828" />
      <stop offset="100%" stop-color="#7a0010" />
    </radialGradient>
    <radialGradient id="blueBall" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="14%" stop-color="#bcd2ff" />
      <stop offset="55%" stop-color="#1f56d8" />
      <stop offset="100%" stop-color="#0a1f6e" />
    </radialGradient>
    <radialGradient id="yellowBall" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="14%" stop-color="#fff2a0" />
      <stop offset="55%" stop-color="#f5b800" />
      <stop offset="100%" stop-color="#8a5e00" />
    </radialGradient>
    <linearGradient id="swoosh" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1c4ba9" />
      <stop offset="50%" stop-color="#2967df" />
      <stop offset="100%" stop-color="#1c4ba9" />
    </linearGradient>
  </defs>

  <!-- Blue swoosh under the balls -->
  <path d="M 14 160 Q 100 220 186 160 Q 178 192 100 198 Q 22 192 14 160 Z"
        fill="url(#swoosh)" />
  <!-- Shadow accent on swoosh -->
  <path d="M 24 168 Q 100 210 176 168 Q 168 188 100 192 Q 32 188 24 168 Z"
        fill="#0c2e7a" opacity="0.35" />

  <!-- Blue ball (bottom-left) -->
  <g>
    <circle cx="58" cy="120" r="42" fill="url(#blueBall)" />
    <circle cx="58" cy="120" r="42" fill="none" stroke="#0a1f6e" stroke-width="1.5" />
    <circle cx="58" cy="120" r="24" fill="#fff" />
    <text x="58" y="132" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900"
          text-anchor="middle" fill="#1c4ba9">3</text>
    <!-- Highlight -->
    <ellipse cx="46" cy="104" rx="9" ry="6" fill="rgba(255,255,255,0.55)" transform="rotate(-30 46 104)" />
  </g>

  <!-- Yellow ball (bottom-right) -->
  <g>
    <circle cx="146" cy="120" r="42" fill="url(#yellowBall)" />
    <circle cx="146" cy="120" r="42" fill="none" stroke="#8a5e00" stroke-width="1.5" />
    <circle cx="146" cy="120" r="24" fill="#fff" />
    <text x="146" y="132" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900"
          text-anchor="middle" fill="#c98a00">9</text>
    <ellipse cx="134" cy="104" rx="9" ry="6" fill="rgba(255,255,255,0.55)" transform="rotate(-30 134 104)" />
  </g>

  <!-- Red ball (top center) -->
  <g>
    <circle cx="102" cy="60" r="42" fill="url(#redBall)" />
    <circle cx="102" cy="60" r="42" fill="none" stroke="#7a0010" stroke-width="1.5" />
    <circle cx="102" cy="60" r="24" fill="#fff" />
    <text x="102" y="72" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900"
          text-anchor="middle" fill="#dc2828">7</text>
    <ellipse cx="90" cy="44" rx="9" ry="6" fill="rgba(255,255,255,0.55)" transform="rotate(-30 90 44)" />
  </g>
</svg>
